name: SMS Servisi

on:
  schedule:
    - cron: '0 5 * * *'           # Her sabah 08:00 TR — haber bülteni
    - cron: '0 2 * * *'           # Her sabah 05:00 TR — hava durumu
    - cron: '30 16 4,8,12,18,26 4 *'  # Maç günleri 19:30 TR — kadro SMS
    - cron: '0 17 22 4 *'         # 22 Nisan kupa 20:00 TR — kadro SMS
    - cron: '45 16 4,8,12,18,26 4 *'  # Maç günleri 19:45 TR — canlı takip başla
    - cron: '15 17 22 4 *'        # 22 Nisan kupa 20:15 TR — canlı takip başla
    - cron: '15 18 31 3 *'        # TEST: Kosova-Turkiye 21:15 TR — kadro
    - cron: '30 18 31 3 *'        # TEST: Kosova-Turkiye 21:30 TR — canlı takip
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod: news, match, weather veya live'
        required: true
        default: 'news'

jobs:
  sabah-bulteni:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'news')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Haber bulteni gonder
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_PHONE_NUMBER:    ${{ secrets.TO_PHONE_NUMBER }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python daily_news_sms.py news --force

  mac-oncesi-uyari:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '30 16 4,8,12,18,26 4 *' || github.event.schedule == '0 17 22 4 *' || github.event.schedule == '15 18 31 3 *')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'match')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Mac oncesi kontrol
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_PHONE_NUMBER:    ${{ secrets.TO_PHONE_NUMBER }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python daily_news_sms.py match --force

  canli-mac-takip:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '45 16 4,8,12,18,26 4 *' || github.event.schedule == '15 17 22 4 *' || github.event.schedule == '30 18 31 3 *')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'live')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Canli gol takibi
        timeout-minutes: 160
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_PHONE_NUMBER:    ${{ secrets.TO_PHONE_NUMBER }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python daily_news_sms.py live --force

  hava-durumu:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weather')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Hava durumu gonder
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_PHONE_NUMBER:    ${{ secrets.TO_PHONE_NUMBER }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: python daily_news_sms.py weather --force
